name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        perl: [ '5.16', '5.24', '5.32', '5.38', 'latest' ]
    container:
      image: perl:${{ matrix.perl }}
    name: perl ${{ matrix.perl }}
    steps:
      - uses: actions/checkout@v4
      - name: Perl version
        run: perl -V
      - name: Install dependencies
        run: cpanm --quiet --notest --installdeps .
      - name: Run tests
        run: prove -lv t/
